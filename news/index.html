<script src="../assets/js/main.js"></script>
<script>
/* ===== お知らせデータ（ここに1件ずつ足すだけ） =====
   type: accepted / published / presented / award
   link は任意（無い場合は '' か省略） */
const NEWS = [
  { date:'2026-07', type:'published', journal:'Clinical Case Reports',
    title:'Severe Neutropenia and Esophagitis Associated With Avelumab for Urothelial Carcinoma: A Case Report',
    link:'https://onlinelibrary.wiley.com/doi/10.1002/ccr3.73086' },
  { date:'2026-05', type:'published', journal:'BJUI Compass',
    title:'Association of erectile dysfunction and male lower urinary tract symptoms in a Japanese cross-sectional survey',
    link:'https://bjui-journals.onlinelibrary.wiley.com/doi/10.1002/bco2.70219' }
];

const LABEL = { accepted:'Accepted', published:'Published', presented:'学会発表', award:'受賞' };
function esc(s){ return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

document.getElementById('news-list').innerHTML = NEWS.map(n => {
  const link = n.link ? `<a class="news-link t-${n.type}" href="${esc(n.link)}" target="_blank" rel="noopener">論文を見る →</a>` : '';
  const ym = n.date ? esc(n.date).replace('-', '. ') : '';
  const dateEl = n.date ? `<span class="news-date">${ym}</span>` : '';
  const badgeEl = n.date ? `<span class="news-badge t-${n.type}">${LABEL[n.type]}</span>` : '';
  const topEl = (dateEl || badgeEl) ? `<div class="news-top">${dateEl}${badgeEl}</div>` : '';
  const journalEl = n.journal ? `<div class="news-journal"><b>${esc(n.journal)}</b></div>` : '';
  return `<article class="news-item t-${n.type}">
    <div class="news-node">
      <svg class="news-bloom t-${n.type}" viewBox="0 0 40 40" fill="currentColor" aria-hidden="true">
        <g>
          <ellipse cx="20" cy="8"  rx="5.5" ry="9"/>
          <ellipse cx="32" cy="16" rx="5.5" ry="9" transform="rotate(72 32 16)"/>
          <ellipse cx="27" cy="31" rx="5.5" ry="9" transform="rotate(144 27 31)"/>
          <ellipse cx="13" cy="31" rx="5.5" ry="9" transform="rotate(216 13 31)"/>
          <ellipse cx="8"  cy="16" rx="5.5" ry="9" transform="rotate(288 8 16)"/>
        </g>
        <circle cx="20" cy="20" r="5" fill="#fff9e8"/>
      </svg>
      <svg class="news-bud" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 22 L12 12" stroke="#2f7d34" stroke-width="2.4" stroke-linecap="round" fill="none"/>
        <path d="M12 14 C5 14 1 10 1 4 C8 4 12 8 12 14 Z" fill="#63bd57"/>
        <path d="M12 12 C19 12 23 8 23 2 C16 2 12 6 12 12 Z" fill="#7ccf6f"/>
      </svg>
    </div>
    <div class="news-card">
      ${topEl}
      ${journalEl}
      <div class="news-title">${esc(n.title)}</div>
      ${link}
    </div>
  </article>`;
}).join('');

/* 出現アニメ */
const nio = new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');nio.unobserve(e.target);}});},{threshold:.2});
document.querySelectorAll('.news-item').forEach(el=>nio.observe(el));
</script>
</body>
